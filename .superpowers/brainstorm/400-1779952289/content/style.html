<h2>路线图的视觉风格？</h2>
<p class="subtitle">节点式学习路径的布局方式。以「计算机视觉」4阶段学习计划为例。</p>

<div class="options">
  <div class="option" data-choice="tree" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>自上而下层级树</h3>
      <p>顶部是目标节点，向下逐层展开阶段→周→关键主题。节点用彩色圆角卡片，连线带箭头表示依赖关系。类似 airoadmaps.org 的风格。</p>
    </div>
  </div>
  <div class="option" data-choice="horizontal" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>从左到右横向流程</h3>
      <p>左侧起点，分阶段向右展开。每个阶段是一列节点组，阶段之间有粗箭头连接。适合展示时间推进的线性学习路径。</p>
    </div>
  </div>
  <div class="option" data-choice="mindmap" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>中心发散思维导图</h3>
      <p>中心是学习目标，4个阶段作为主分支向外辐射，每个阶段下挂周节点和关键主题。更自由、更强调关联而非线性顺序。</p>
    </div>
  </div>
</div>
