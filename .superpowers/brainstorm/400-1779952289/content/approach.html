<h2>路线图应放在哪里？</h2>
<p class="subtitle">在现有的学习计划页面中，如何集成可视化路线图？</p>

<div class="options">
  <div class="option" data-choice="tab" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>新增标签页</h3>
      <p>在计划详情页现有的「时间线」和「理论依据」旁边增加第三个 Tab「路线图」。用户点击即可切换到可视化路线图视图。不破坏现有布局，两种视图互相独立。</p>
    </div>
  </div>
  <div class="option" data-choice="top" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>页面顶部展示</h3>
      <p>将路线图放在计划详情页的最顶部（概览卡片下方、Tab 上方）。路线图作为概览，折叠状态显示阶段节点，展开可看详细周/日节点。下方仍保留时间线列表。</p>
    </div>
  </div>
  <div class="option" data-choice="replace" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>替换时间线</h3>
      <p>完全用交互式路线图替代当前的时间线视图。路线图本身包含所有层级信息（阶段→周→任务），点击节点展开详情。是更彻底的改版方案。</p>
    </div>
  </div>
</div>
